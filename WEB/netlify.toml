# Netlify configuration

# Proxy /api/* to Railway backend — avoids CORS since this becomes same-origin
[[redirects]]
  from = "/api/*"
  to = "https://institutopersonayfamilia.railway.app/api/:splat"
  status = 200
  force = true

# Block direct HTTP access to the /backend/ folder
[[redirects]]
  from = "/backend/*"
  to = "/404"
  status = 404
  force = true
